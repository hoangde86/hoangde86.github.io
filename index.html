<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đọc Kinh Thánh</title>
<style>
:root{--bg:#fdf8f0;--card:#fff;--text:#2c2c2c;--muted:#888;--primary:#7b4f2e;--accent:#c0392b;--border:#e8ddd0;--hl:#fff8e1}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;padding:20px;display:flex;flex-direction:column}
.container{max-width:780px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column;min-height:0}
h1{text-align:center;font-size:24px;color:var(--primary);margin-bottom:4px;font-weight:700}
.subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}

/* Main card */
.main-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:18px;min-height:160px;display:flex;flex-direction:column;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.07)}
.progress-line{display:flex;justify-content:space-between;align-items:center}
.progress-num{font-size:13px;color:var(--muted);font-weight:600}
.progress-bar{flex:1;height:4px;background:#f0e8dc;border-radius:2px;margin:0 12px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.sentence-text{font-size:20px;line-height:1.75;color:var(--text);font-weight:500;min-height:80px;transition:opacity .2s}
.sentence-text.fade{opacity:0}

/* Controls */
.controls{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s}
.btn-nav{background:var(--card);border:2px solid var(--border);color:var(--text)}
.btn-nav:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.btn-nav:disabled{opacity:.4;cursor:not-allowed}
.btn-play{background:var(--primary);color:#fff;padding:12px 36px;font-size:16px;min-width:140px}
.btn-play:hover{background:#6a4227}
.btn-play.playing{background:var(--accent)}
.btn-play.playing:hover{background:#a93226}

/* Options */
.options{display:flex;gap:20px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:20px;font-size:14px;color:var(--muted)}
.options label{display:flex;align-items:center;gap:6px;cursor:pointer}
.options input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.rate-group{display:flex;align-items:center;gap:8px}
.rate-group input[type=range]{width:90px;accent-color:var(--primary);cursor:pointer}
.rate-val{font-weight:600;color:var(--primary);min-width:28px}
.options select{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;cursor:pointer;color:var(--text);max-width:210px}

/* Sentence list */
.list-header{font-size:13px;font-weight:700;color:var(--primary);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.sentence-list{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0;overflow-y:auto;padding-right:4px}
.sentence-list::-webkit-scrollbar{width:4px}
.sentence-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sentence-item{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;line-height:1.55;color:var(--text);transition:all .15s;display:flex;gap:10px;align-items:flex-start}
.sentence-item:hover{border-color:var(--primary);background:#fdf4ec}
.sentence-item.active{background:var(--hl);border-color:var(--primary);border-width:2px;font-weight:600}
.sentence-item.active .item-num{color:var(--primary)}
.sentence-item.done .item-num::after{content:'✓';font-size:10px;margin-left:2px;color:#27ae60}
.item-num{font-size:12px;color:var(--muted);font-weight:700;min-width:24px;padding-top:1px;flex-shrink:0}
.item-text{flex:1}

.hint{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none;margin-left:8px}

@media(max-width:580px){
  .main-card{padding:18px 16px}
  .sentence-text{font-size:17px}
  .btn-play{padding:10px 24px}
  h1{font-size:20px}
}
</style>
</head>
<body>
<div class="container">
  <h1>📖 Đọc Kinh Thánh</h1>
  <p class="subtitle">1 Phi-e-rơ 2 — Bấm vào câu hoặc nhấn Đọc để nghe</p>

  <div class="main-card">
    <div class="progress-line">
      <span class="progress-num" id="progressNum">1 / 22</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:4.5%"></div></div>
    </div>
    <div class="sentence-text" id="sentenceText"></div>
  </div>

  <div class="controls">
    <button class="btn btn-nav" id="prevBtn" disabled>‹ Trước</button>
    <button class="btn btn-play" id="playBtn">▶ Đọc</button>
    <button class="btn btn-nav" id="nextBtn">Sau ›</button>
  </div>

  <div class="options">
    <label><input type="checkbox" id="autoNext"> Tự chuyển</label>
    <div class="rate-group">
      <span>Nguồn TTS:</span>
      <select id="ttsSrc">
        <option value="speech">Trình duyệt (Web Speech)</option>
        <option value="google">Google Translate TTS</option>
      </select>
    </div>
    <div class="rate-group" id="voiceGroup">
      <span>Giọng:</span>
      <select id="voiceSel"><option value="">Đang tải...</option></select>
    </div>
    <div class="rate-group" id="rateGroup">
      <span>Tốc độ:</span>
      <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.85">
      <span class="rate-val" id="rateVal">0.85</span>
    </div>
  </div>

  <div class="list-header">Danh sách câu <span class="hint">Space = Đọc/Dừng &nbsp;·&nbsp; ← → = Trước/Sau</span></div>
  <div class="sentence-list" id="sentenceList"></div>
</div>

<script>
const SENTENCES = [
  "Phải tin Đức Chúa Jêsus-Christ, là đá góc nhà",
  "1Vậy anh em đã từ-bỏ mọi điều độc-ác, mọi điều gian-giảo, mọi thứ giả-trá, lòng ghen-ghét và sự nói hành, 2thì hãy ham-thích sữa thiêng-liêng của Đạo, như trẻ con mới đẻ vậy, hầu cho anh em nhờ đó lớn lên mà được rỗi linh-hồn, 3nếu anh em đã nếm biết Chúa là ngọt-ngào.",
  "4Hãy đến gần Ngài, là hòn đá sống, bị người ta loại ra, song được chọn và quí trước mặt Đức Chúa Trời, 5và anh em cũng như đá sống, được xây nên nhà thiêng-liêng, làm chức tế-lễ thánh, đặng dâng của tế-lễ thiêng-liêng, nhờ Đức Chúa Jêsus-Christ mà đẹp ý Đức Chúa Trời.",
  "6Vì trong Kinh-thánh có chép rằng: Nầy, ta đặt tại Si-ôn hòn đá góc nhà đã chọn-lựa và quí-báu; Ai tin đến đá ấy sẽ không bị xấu-hổ.",
  "7Vậy nên, cho anh em là kẻ đã tin, thì là đá quí; nhưng cho những kẻ không tin, thì Hòn đá mà bị thợ xây nhà loại ra, Bèn trở nên đá góc nhà, là Đá gây cho vấp-váp, là đá lớn làm cho sa-ngã; 8họ bị vấp đá đó, vì không vâng-phục Đạo, và điều ấy đã định sẵn cho họ rồi.",
  "9Nhưng anh em là dòng-giống được lựa-chọn, là chức thầy tế-lễ nhà vua, là dân thánh, là dân thuộc về Đức Chúa Trời, hầu cho anh em rao-giảng nhân-đức của Đấng đã gọi anh em ra khỏi nơi tối-tăm, đến nơi sáng-láng lạ-lùng của Ngài; 10anh em ngày trước không phải là một dân, mà bây giờ là dân Đức Chúa Trời, trước không được thương-xót, mà bây giờ được thương-xót.",
  "Giữ cho khỏi những sự ham-muốn xác-thịt.",
  "11Hỡi kẻ rất yêu-dấu, anh em như người ở trọ, kẻ đi đường, tôi khuyên phải kiêng những điều xác-thịt ưa-thích, là điều chống-trả với linh-hồn.",
  "12Phải ăn-ở ngay-lành giữa dân ngoại, hầu cho họ, là kẻ vẫn gièm-chê anh em như người gian-ác, đã thấy việc lành anh em, thì đến ngày Chúa thăm-viếng, họ ngợi-khen Đức Chúa Trời.",
  "Bổn-phận đối với các bậc có quyền",
  "13Vì cớ Chúa, hãy phục theo mọi phép-tắc loài người lập lên, hoặc vua, như đấng rất cao, 14hoặc các quan, như người vua sai ra để phạt kẻ làm dữ và khen người làm lành.",
  "15Vì anh em làm điều lành để ngăn miệng những kẻ ngu-muội dại-dột, ấy là ý-muốn của Đức Chúa Trời.",
  "16Hãy ăn-ở như người tự-do, nhưng chớ dùng tự-do làm cái màn che sự hung-ác, song phải coi mình là tôi-mọi Đức Chúa Trời. 17Hãy kính mọi người; yêu anh em; kính-sợ Đức Chúa Trời; tôn-trọng vua.",
  "Bổn-phận kẻ tôi-tớ",
  "18Hỡi kẻ làm tôi-tớ, hãy lấy lòng rất kính-sợ mà phục theo chủ mình, chẳng những phục người chủ hiền-lành mà thôi, lại phải phục người chủ khó tánh nữa.",
  "19Vì nhân cớ lương-tâm đối với Đức Chúa Trời, mà chịu khốn-nạn trong khi bị oan-ức, ấy là một ơn phước.",
  "20Vả, mình làm điều ác, bị đánh mà hay nhịn-chịu, thì có đáng khoe gì? Nhưng nếu anh em làm lành, mà nhịn-chịu sự khốn-khó, ấy là một ơn phước trước mặt Đức Chúa Trời.",
  "21Anh em đã được kêu-gọi đến sự đó, vì Đấng Christ cũng đã chịu khổ cho anh em, để lại cho anh em một gương, hầu cho anh em noi dấu chân Ngài;",
  "22Ngài chưa hề phạm tội, trong miệng Ngài không thấy có chút chi dối-trá;",
  "23Ngài bị rủa mà chẳng rủa lại, chịu nạn mà không hề ngăm-dọa, nhưng cứ phó mình cho Đấng xử-đoán công-bình;",
  "24Ngài gánh tội-lỗi chúng ta trong thân-thể Ngài trên cây gỗ, hầu cho chúng ta là kẻ đã chết về tội-lỗi, được sống cho sự công-bình; lại nhân những lằn đòn của Ngài mà anh em đã được lành bịnh.",
  "25Vì anh em vốn giống như con chiên lạc, mà bây giờ đã trở về cùng Đấng chăn-chiên và Giám-mục của linh-hồn mình."
];

const TOTAL = SENTENCES.length;
let current = 0;
let isPlaying = false;
let done = new Set();

const sentenceTextEl = document.getElementById('sentenceText');
const progressNumEl  = document.getElementById('progressNum');
const progressFillEl = document.getElementById('progressFill');
const playBtn        = document.getElementById('playBtn');
const prevBtn        = document.getElementById('prevBtn');
const nextBtn        = document.getElementById('nextBtn');
const autoNextEl     = document.getElementById('autoNext');
const rateSlider     = document.getElementById('rateSlider');
const rateValEl      = document.getElementById('rateVal');
const listEl         = document.getElementById('sentenceList');
const ttsSrcEl       = document.getElementById('ttsSrc');
const voiceSelEl     = document.getElementById('voiceSel');
const voiceGroupEl   = document.getElementById('voiceGroup');
const rateGroupEl    = document.getElementById('rateGroup');

// Build sentence list
function buildList(){
  listEl.innerHTML = SENTENCES.map(function(s, i){
    return '<div class="sentence-item" data-idx="' + i + '">' +
      '<span class="item-num">' + (i+1) + '</span>' +
      '<span class="item-text">' + escHTML(s) + '</span>' +
    '</div>';
  }).join('');
}

function escHTML(s){
  return s.replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function updateUI(){
  sentenceTextEl.textContent = SENTENCES[current];
  progressNumEl.textContent = (current+1) + ' / ' + TOTAL;
  progressFillEl.style.width = ((current+1)/TOTAL*100).toFixed(1) + '%';
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === TOTAL - 1;

  // Scroll list item into view
  const items = listEl.querySelectorAll('.sentence-item');
  items.forEach(function(el, i){
    el.classList.toggle('active', i === current);
    el.classList.toggle('done', done.has(i) && i !== current);
  });
  const activeItem = listEl.querySelector('.sentence-item.active');
  if(activeItem) activeItem.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function goto(idx){
  stopSpeak();
  current = idx;
  updateUI();
}

// Speech
let utter = null;
let currentAudio = null;
let speakSeq = 0;
function getRate(){ return parseFloat(rateSlider.value); }

function cleanForTts(text){
  // Remove verse numbers glued to words, e.g. "1Vậy", "2thì", "10anh"
  return text.replace(/\d+(?=[A-Za-zÀ-ỹĂăÂâĐđÊêÔôƠơƯư])/g, '').trim();
}

function googleTtsUrl(text){
  return 'https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=' + encodeURIComponent(text);
}

function splitChunks(text, max){
  max = max || 180;
  if(text.length <= max) return [text];
  var chunks = [], remaining = text;
  while(remaining.length > max){
    var idx = remaining.lastIndexOf(' ', max);
    if(idx < 60) idx = max;
    chunks.push(remaining.slice(0, idx).trim());
    remaining = remaining.slice(idx).trim();
  }
  if(remaining) chunks.push(remaining);
  return chunks;
}

function playAudioUrl(url){
  return new Promise(function(resolve, reject){
    var a = new Audio();
    a.src = url;
    currentAudio = a;
    var settled = false;
    var fin = function(ok){ if(settled) return; settled=true; currentAudio=null; ok?resolve():reject(); };
    a.onended = function(){ fin(true); };
    a.onerror = function(){ fin(false); };
    var tm = setTimeout(function(){ fin(false); }, 10000);
    a.onloadedmetadata = function(){ clearTimeout(tm); };
    a.play().catch(function(){ fin(false); });
  });
}

function speakViaSpeech(text){
  return new Promise(function(resolve){
    if(!('speechSynthesis' in window)){ resolve(); return; }
    try{ window.speechSynthesis.cancel(); }catch(e){}
    utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'vi-VN';
    utter.rate = getRate();
    var voiceName = voiceSelEl.value;
    if(voiceName){
      var voices = window.speechSynthesis.getVoices();
      var v = voices.find(function(x){ return x.name === voiceName; });
      if(v) utter.voice = v;
    } else {
      var voices = window.speechSynthesis.getVoices();
      var v = voices.find(function(x){ return x.lang === 'vi-VN'; }) ||
              voices.find(function(x){ return x.lang.startsWith('vi'); });
      if(v) utter.voice = v;
    }
    utter.onend = function(){ resolve(); };
    utter.onerror = function(){ resolve(); };
    window.speechSynthesis.speak(utter);
  });
}

async function startSpeak(){
  stopSpeak();
  isPlaying = true;
  var mySeq = ++speakSeq;
  playBtn.textContent = '⏹ Dừng';
  playBtn.classList.add('playing');

  var text = cleanForTts(SENTENCES[current]);
  var src = ttsSrcEl.value;

  if(src === 'google'){
    var chunks = splitChunks(text);
    for(var i = 0; i < chunks.length; i++){
      if(mySeq !== speakSeq) return;
      try{ await playAudioUrl(googleTtsUrl(chunks[i])); }catch(e){}
    }
  } else {
    if(mySeq !== speakSeq) return;
    await speakViaSpeech(text);
  }

  if(mySeq !== speakSeq) return;
  done.add(current);
  isPlaying = false;
  playBtn.textContent = '▶ Đọc';
  playBtn.classList.remove('playing');
  updateUI();
  if(autoNextEl.checked && current < TOTAL - 1){
    current++;
    updateUI();
    setTimeout(startSpeak, 400);
  }
}

function stopSpeak(){
  speakSeq++;
  if(currentAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }
  if(utter){ try{ window.speechSynthesis.cancel(); }catch(e){} utter = null; }
  isPlaying = false;
  playBtn.textContent = '▶ Đọc';
  playBtn.classList.remove('playing');
}

function populateVoices(){
  if(!('speechSynthesis' in window)) return;
  var voices = window.speechSynthesis.getVoices();
  var vi = voices.filter(function(v){ return v.lang.startsWith('vi'); });
  if(vi.length === 0){
    voiceSelEl.innerHTML = '<option value="">Không có giọng vi (dùng mặc định)</option>';
    return;
  }
  voiceSelEl.innerHTML = vi.map(function(v){
    return '<option value="' + escHTML(v.name) + '">' + escHTML(v.name) + (v.localService?' (offline)':' (online)') + '</option>';
  }).join('');
}

function updateTtsUI(){
  var src = ttsSrcEl.value;
  voiceGroupEl.style.display = src === 'speech' ? '' : 'none';
  rateGroupEl.style.display  = src === 'speech' ? '' : 'none';
  localStorage.setItem('kt_ttsSrc', src);
}

// Events
playBtn.addEventListener('click', function(){
  if(isPlaying){ stopSpeak(); } else { startSpeak(); }
});

prevBtn.addEventListener('click', function(){ if(current > 0) goto(current - 1); });
nextBtn.addEventListener('click', function(){ if(current < TOTAL - 1) goto(current + 1); });

rateSlider.addEventListener('input', function(){
  rateValEl.textContent = parseFloat(rateSlider.value).toFixed(2);
  if(isPlaying && ttsSrcEl.value === 'speech'){ startSpeak(); }
});

ttsSrcEl.addEventListener('change', function(){
  stopSpeak();
  updateTtsUI();
});

listEl.addEventListener('click', function(e){
  const item = e.target.closest('.sentence-item');
  if(!item) return;
  goto(parseInt(item.dataset.idx));
  startSpeak();
});

document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT') return;
  if(e.key === ' '){ e.preventDefault(); isPlaying ? stopSpeak() : startSpeak(); }
  if(e.key === 'ArrowLeft' && current > 0){ goto(current - 1); }
  if(e.key === 'ArrowRight' && current < TOTAL - 1){ goto(current + 1); }
});

// Init TTS source from localStorage
var savedSrc = localStorage.getItem('kt_ttsSrc');
if(savedSrc) ttsSrcEl.value = savedSrc;
updateTtsUI();

// Init voices (Chrome loads async)
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = function(){ populateVoices(); };
  populateVoices();
}

buildList();
updateUI();
</script>
</body>
</html>
