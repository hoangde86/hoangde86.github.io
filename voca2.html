<head>

<title>Học từ vựng tiếng Anh - A1 Movers, A2 Flyers, A2 Key</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;--primary:#3498db;--accent:#e74c3c;--border:#e1e8ed;--ipa:#9b59b6;--pos:#27ae60}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:28px;margin-bottom:10px;text-align:center;color:var(--primary)}
.subtitle{text-align:center;color:var(--muted);margin-bottom:14px;font-size:14px}
.voice-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.voice-bar label{font-size:13px;color:var(--muted)}
.voice-bar select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;cursor:pointer}
.tabs{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.tab{padding:10px 20px;background:#fff;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s;color:var(--text)}
.tab:hover{border-color:var(--primary)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab .count{font-size:12px;opacity:.85;margin-left:6px;font-weight:400}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;align-items:center}
.search{flex:1;min-width:240px;max-width:480px;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:15px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--primary)}
.stats{color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.word-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.word{font-size:20px;font-weight:700;color:var(--text);cursor:pointer;user-select:none;border-bottom:2px dashed transparent;transition:border-color .2s}
.word:hover{border-bottom-color:var(--primary)}
.word.speaking{color:var(--primary)}
.audio-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;color:var(--primary);transition:background .15s}
.audio-btn:hover{background:#e3f2fd}
.audio-btn.speaking{background:#fff3e0;color:var(--accent)}
.audio-btn:active{transform:scale(.92)}
.ipa{color:var(--ipa);font-size:14px;font-style:italic}
.pos{color:var(--pos);font-size:12px;background:#e8f8f0;padding:2px 8px;border-radius:10px;font-weight:500}
.meaning{color:var(--text);font-size:15px;margin:6px 0 8px;font-weight:500}
.example{padding:8px 10px;background:#f8f9fa;border-left:3px solid var(--primary);border-radius:4px;font-size:14px;margin-top:6px;cursor:pointer;transition:background .15s}
.example:hover{background:#eef5fc}
.example.speaking{background:#fff3e0;border-left-color:var(--accent)}
.example .en{color:var(--text);margin-bottom:4px}
.example .vi{color:var(--muted);font-size:13px;font-style:italic}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:16px}
.footer{text-align:center;margin-top:30px;color:var(--muted);font-size:13px}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.page-btn{padding:6px 12px;background:#fff;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px}
.page-btn:hover{border-color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.5;cursor:not-allowed}
@media (max-width:600px){body{padding:10px}h1{font-size:22px}.grid{grid-template-columns:1fr}.tab{padding:8px 14px;font-size:13px}}
</style>
</head>

let currentAudio = null;
let activeBtn = null;
let speakSeq = 0;

function googleUrl(text){
  const tld = accent === 'uk' ? 'co.uk' : 'com';
  return 'https://translate.google.' + tld + '/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=' + encodeURIComponent(text);
}
function youdaoUrl(text){
  // type=1 American, type=2 British
  const t = accent === 'uk' ? 2 : 1;
  return 'https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=' + t;
}

function splitText(text, max){
  max = max || 180;
  text = String(text).trim();
  if(text.length <= max) return [text];
  const chunks = [];
  let s = '';
  const words = text.split(/\s+/);
  for(const w of words){
    if((s + ' ' + w).trim().length > max){
      if(s) chunks.push(s.trim());
      s = w;
    } else {
      s = (s + ' ' + w).trim();
    }
  }
  if(s) chunks.push(s);
  return chunks;
}

function clearActive(){
  if(activeBtn){ activeBtn.classList.remove('speaking'); activeBtn = null; }
}

function playAudioUrl(url){
  return new Promise(function(resolve, reject){
    const a = new Audio();
    a.src = url;
    currentAudio = a;
    let settled = false;
    const done = function(ok){ if(settled) return; settled = true; ok ? resolve() : reject(new Error('play fail')); };
    a.onended = function(){ done(true); };
    a.onerror = function(){ done(false); };
    // Failsafe timeout: if no metadata after 4s, treat as fail
    const tm = setTimeout(function(){ done(false); }, 8000);
    a.onloadedmetadata = function(){ clearTimeout(tm); };
    a.play().catch(function(){ done(false); });
  });
}

function speakViaSpeechSynthesis(text){
  return new Promise(function(resolve){
    if(!('speechSynthesis' in window)){ resolve(false); return; }
    try{ window.speechSynthesis.cancel(); }catch(e){}
    const u = new SpeechSynthesisUtterance(text);
    u.lang = accent === 'uk' ? 'en-GB' : 'en-US';
    u.rate = 0.9;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(function(x){ return x.lang === u.lang; }) ||
              voices.find(function(x){ return x.lang.startsWith('en'); });
    if(v) u.voice = v;
    u.onend = function(){ resolve(true); };
    u.onerror = function(){ resolve(false); };
    window.speechSynthesis.speak(u);
  });
}

async function speakChunk(text){
  // Strategy based on voiceSrc setting
  if(voiceSrc === 'speech'){
    return speakViaSpeechSynthesis(text);
  }
  if(voiceSrc === 'youdao'){
    try{ await playAudioUrl(youdaoUrl(text)); return true; }catch(e){}
    return speakViaSpeechSynthesis(text);
  }
  if(voiceSrc === 'google'){
    try{ await playAudioUrl(googleUrl(text)); return true; }catch(e){}
    return speakViaSpeechSynthesis(text);
  }
  // auto: mobile prefers Youdao (more reliable on phones), desktop prefers Google
  if(isMobile){
    try{ await playAudioUrl(youdaoUrl(text)); return true; }catch(e){}
    try{ await playAudioUrl(googleUrl(text)); return true; }catch(e){}
    return speakViaSpeechSynthesis(text);
  } else {
    try{ await playAudioUrl(googleUrl(text)); return true; }catch(e){}
    try{ await playAudioUrl(youdaoUrl(text)); return true; }catch(e){}
    return speakViaSpeechSynthesis(text);
  }
}

async function speak(text, btn){
  if(currentAudio){ try{ currentAudio.pause(); }catch(e){} currentAudio = null; }
  try{ window.speechSynthesis && window.speechSynthesis.cancel(); }catch(e){}
  clearActive();
  const mySeq = ++speakSeq;
  if(btn){ btn.classList.add('speaking'); activeBtn = btn; }
  const chunks = splitText(text);
  for(const c of chunks){
    if(mySeq !== speakSeq) return;
    await speakChunk(c);
  }
  if(mySeq === speakSeq){
    clearActive();
    currentAudio = null;
  }
}

function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function getFiltered(){
  const data = DATA[currentList];
  const q = currentFilter.trim().toLowerCase();
  if(!q) return data;
  return data.filter(function(e){
    return e.word.toLowerCase().includes(q) ||
           e.vi_meaning.toLowerCase().includes(q) ||
           e.en_example.toLowerCase().includes(q);
  });
}

function render(){
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const items = filtered.slice(start, start + PAGE_SIZE);

  const grid = document.getElementById('grid');
  if(items.length === 0){
    grid.innerHTML = '<div class="empty">Không tìm thấy từ nào.</div>';
  } else {
    grid.innerHTML = items.map(function(e){
      return '<div class="card">' +
        '<div class="word-row">' +
          '<span class="word" data-text="' + escapeHTML(e.word) + '" title="Click để nghe phát âm">' + escapeHTML(e.word) + '</span>' +
          '<button class="audio-btn" data-text="' + escapeHTML(e.word) + '" title="Phát âm từ">🔊</button>' +
          '<span class="ipa">' + escapeHTML(e.ipa) + '</span>' +
          '<span class="pos">' + escapeHTML(e.pos) + '</span>' +
        '</div>' +
        '<div class="meaning">' + escapeHTML(e.vi_meaning) + '</div>' +
        '<div class="example" data-text="' + escapeHTML(e.en_example) + '" title="Click để nghe câu ví dụ">' +
          '<div class="en">' + escapeHTML(e.en_example) + ' 🔊</div>' +
          '<div class="vi">' + escapeHTML(e.vi_example) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.getElementById('stats').textContent =
    total === 0 ? '0 kết quả' :
    (start+1) + '-' + Math.min(start+PAGE_SIZE, total) + ' / ' + total + ' từ';

  const pag = document.getElementById('pagination');
  if(totalPages <= 1){ pag.innerHTML = ''; return; }
  let pages = [];
  pages.push('<button class="page-btn" ' + (currentPage===1?'disabled':'') + ' data-page="' + (currentPage-1) + '">‹ Trước</button>');
  let prev = 0;
  for(let i = 1; i <= totalPages; i++){
    if(i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)){
      if(prev && i - prev > 1) pages.push('<span style="padding:6px">…</span>');
      pages.push('<button class="page-btn ' + (i===currentPage?'active':'') + '" data-page="' + i + '">' + i + '</button>');
      prev = i;
    }
  }
  pages.push('<button class="page-btn" ' + (currentPage===totalPages?'disabled':'') + ' data-page="' + (currentPage+1) + '">Sau ›</button>');
  pag.innerHTML = pages.join('');
}

document.addEventListener('click', function(e){
  if(e.target.closest('.tab')){
    const t = e.target.closest('.tab');
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    currentList = t.dataset.list;
    currentPage = 1;
    render();
    return;
  }
  let target = e.target.closest('[data-text]');
  if(target){
    speak(target.dataset.text, target);
    return;
  }
  const pageBtn = e.target.closest('.page-btn');
  if(pageBtn && !pageBtn.disabled){
    currentPage = parseInt(pageBtn.dataset.page);
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  }
});

document.getElementById('searchBox').addEventListener('input', function(e){
  currentFilter = e.target.value;
  currentPage = 1;
  render();
});

const voiceSelEl = document.getElementById('voiceSel');
voiceSelEl.value = voiceSrc;
voiceSelEl.addEventListener('change', function(e){
  voiceSrc = e.target.value;
  localStorage.setItem('voiceSrc', voiceSrc);
});
const accentSelEl = document.getElementById('accentSel');
accentSelEl.value = accent;
accentSelEl.addEventListener('change', function(e){
  accent = e.target.value;
  localStorage.setItem('accent', accent);
});

if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = function(){ window.speechSynthesis.getVoices(); };
  window.speechSynthesis.getVoices();
}

render();
</script>
</body>
</html>
